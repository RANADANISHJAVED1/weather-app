apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: weather
    name: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: weather
      name: backend
  template:
    metadata:
      labels:
        app: weather
        name: backend
    spec:
      containers:
      - name: backend
        image: danishplayconsole1/weather-app-backend:v1.1
        ports:
          - containerPort: 5000

        resources:
          limits:
            memory: "512Mi"
          requests:
            cpu: "50m"
            memory: "128Mi"

        env:
          - name: FLASK_ENV
            value: "development"
          - name: DEBUG
            value: "True"
          - name: HOST
            value: "0.0.0.0"
          - name: PORT
            value: "5000"
          - name: WEATHER_API_KEY
            value: "demo_key"
          - name: LOG_LEVEL
            value: "info"