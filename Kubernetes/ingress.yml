apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: weather-app-ingress
spec:
  rules:
  - host: weather.local
    http:
      paths:
      - path: /frontend
        pathType: Prefix
        backend:
          service:
            name: weather-app-frontend
            port:
              number: 3000
      - path: /backend
        pathType: Prefix
        backend:
          service:
            name: weather-app-backend
            port:
              number: 5000