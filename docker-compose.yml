services:
  frontend:
    image: danishplayconsole1/weather-app-frontend:v1.1
    container_name: weather-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - BACKEND_URL= http://backend:5000
      - LOG_LEVEL=info
    deploy:
      resources:
        limits:
          memory: 512M
  backend:
    image:  danishplayconsole1/weather-app-backend:v1.1
    container_name: weather-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - DEBUG=True
      - HOST=0.0.0.0
      - PORT=5000
      - WEATHER_API_KEY=demo_key
      - LOG_LEVEL=info
    deploy:
      resources:
        limits:
          memory: 512M